name: Update Rules

on:
  schedule:
    - cron: '0 0 * * *'   # 每天凌晨 0 点自动运行
  workflow_dispatch:       # 支持手动触发

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      # 1) 检出 rule 分支
      - name: Checkout rule branch
        uses: actions/checkout@v4
        with:
          ref: rule
          fetch-depth: 0

      # 2) 清理旧文件，保留 .git/.github
      - name: Purge previous files keep .github
        run: |
          git rm -rf ./* || true
          find . -mindepth 1 -maxdepth 1 -not -name '.git' -not -name '.github' -exec rm -rf {} +

      # 3) 生成 proxy.domain（后缀过滤 apple/icloud/google）
      - name: Build proxy.domain with suffix filtering
        run: |
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/proxy.txt -o proxy.txt.tmp
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/apple.txt -o apple.txt.tmp
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/icloud.txt -o icloud.txt.tmp
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/google.txt -o google.txt.tmp

          # 清理 proxy.txt
          awk '!/^#/ && NF {gsub(/^[[:space:]]+|[[:space:]]+$/,""); sub(/^\./,""); print}' proxy.txt.tmp > proxy.norm.tmp

          # 清理并合并后缀文件
          cat apple.txt.tmp icloud.txt.tmp google.txt.tmp \
          | awk '!/^#/ && NF {gsub(/^[[:space:]]+|[[:space:]]+$/,""); sub(/^\./,""); print}' \
          | sort -u > suffixes.tmp

          # 过滤掉后缀集合并补点
          grep -vF -f suffixes.tmp proxy.norm.tmp \
          | sort -u \
          | sed -E 's/^([^\.])/\.\1/' > proxy.domain

      # 3b) 生成 proxy.rule (Telegram CIDR)
      - name: Build proxy.rule from Telegram CIDR
        run: |
          curl -sSL https://core.telegram.org/resources/cidr.txt -o telegram.cidr.tmp

          awk '
          /^[[:space:]]*#/ {next}        # 跳过注释
          /^[[:space:]]*$/ {next}        # 跳过空行
          {
            cidr=$0
            gsub(/^[[:space:]]+|[[:space:]]+$/,"",cidr)
            if (cidr ~ /:/) {
              # IPv6
              print "IP-CIDR6," cidr
            } else {
              # IPv4
              print "IP-CIDR," cidr
            }
          }' telegram.cidr.tmp > proxy.rule

      # 4) 生成 direct.domain
      - name: Build direct.domain with dot prefix
        run: |
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/direct.txt -o direct.txt.tmp
          awk '!/^#/ && NF {gsub(/^[[:space:]]+|[[:space:]]+$/,""); if(substr($0,1,1)!=".") print "."$0; else print $0}' direct.txt.tmp \
          | sort -u > direct.domain

      # 5) 处理 blockAds.module → main.module
      - name: Process entire blockAds.module to main.module
        run: |
          curl -sSL https://raw.githubusercontent.com/fmz200/wool_scripts/refs/heads/main/Surge/module/blockAds.module -o blockAds.module.tmp

          awk '
          BEGIN {print "#!name=General"; print "#!category=Main"}
          /^#!arguments/ {next}              # 不再保留 #!arguments 行
          /^[[:space:]]*#/ {next}            # 跳过注释
          /^[[:space:]]*$/ {next}            # 跳过空行
          {
            if ($0 ~ /^[A-Z]/) gsub(/[[:space:]]+/,"")   # 大写字母开头的行去掉所有空格
            else gsub(/^[[:space:]]+|[[:space:]]+$/,"")  # 其他行去掉首尾空格
            print
          }' blockAds.module.tmp > main.module

      # 6) 处理 rejectAd.list → reject.domain 和 reject.rule
      - name: Build reject.domain and reject.rule
        run: |
          curl -sSL https://raw.githubusercontent.com/fmz200/wool_scripts/main/Loon/rule/rejectAd.list -o rejectAd.list.tmp

          awk '!/^#/ && NF {
            gsub(/[[:space:]]+/,"")
            if ($0 ~ /^(DOMAIN-SUFFIX|DOMAIN),/) {
              sub(/^(DOMAIN-SUFFIX|DOMAIN),/,"")
              if(substr($0,1,1)!=".") print "."$0 > "reject.domain"
              else print $0 > "reject.domain"
            } else {
              print > "reject.rule"
            }
          }' rejectAd.list.tmp

      # 7) 提交并推送
      - name: Commit and push with detailed changes
        run: |
          rm -f *.tmp
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git add .

          NUMSTAT=$(git diff --cached --numstat | awk '{print $3 " +" $1 "/-" $2}')

          git commit -m "Update rules" -m "$NUMSTAT" || echo "No changes to commit"
          git push origin rule
