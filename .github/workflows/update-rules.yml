name: Update Rules

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches:
      - main
    paths:
      - '.github/**'
  workflow_dispatch:

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Switch Branch & Get Custom Files
        run: |
          set -eo pipefail
          git fetch origin; if git branch -r | grep 'origin/rule'; then git checkout rule; else git checkout --orphan rule; fi
          git fetch origin main; git checkout main -- .github/

      - name: Update Reject Rules
        run: |
          set -eo pipefail
          step="Reject Rules: 1Hosts wildcards"; curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 -sSL "https://raw.githubusercontent.com/badmojr/1Hosts/master/Pro/domains.wildcards" | grep -v '^#' | sed '/^$/d' | sed 's/^/./' > reject.domain; echo "$step reject.domain $(stat -c '%s' reject.domain) bytes"
          step="Reject Rules: AdRules domains"; curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 -sSL "https://raw.githubusercontent.com/Cats-Team/AdRules/main/adrules_domainset.txt" | grep -v '^#' | sed '/^$/d' | sed 's/^+//' >> reject.domain; echo "$step reject.domain $(stat -c '%s' reject.domain) bytes"
          step="Reject Rules: AWAvenue-Ads-Rule"; curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 -sSL "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge.list" | grep -v '^#' | sed '/^$/d' >> reject.domain; echo "$step reject.domain $(stat -c '%s' reject.domain) bytes"
          step="Reject Rules: anti-AD surge2"; curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 -sSL "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-surge2.txt" | grep -v '^#' | sed '/^$/d' >> reject.domain; echo "$step reject.domain $(stat -c '%s' reject.domain) bytes"
          step="Reject Rules: sort"; LC_ALL=C sort -u -o reject.domain reject.domain; echo "$step reject.domain $(stat -c '%s' reject.domain) bytes"

      - name: Update Direct Rules
        run: |
          set -eo pipefail
          step="Direct Rules: cdn_domain_list.txt download"; curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 -sSL "https://raw.githubusercontent.com/pmkol/easymosdns/rules/cdn_domain_list.txt" | grep -v '^#' | sed '/^$/d' | grep '^full:' | sed 's/full://' > direct.domain; echo "$step direct.domain $(stat -c '%s' direct.domain) bytes"
          step="Direct Rules: sort"; LC_ALL=C sort -u -o direct.domain direct.domain; echo "$step direct.domain $(stat -c '%s' direct.domain) bytes"

      - name: Update Proxy Rules
        run: |
          set -eo pipefail
          step="Proxy Rules: gfw_domain_list.txt"; curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 -sSL "https://raw.githubusercontent.com/pmkol/easymosdns/rules/gfw_domain_list.txt" | grep -v '^#' | sed '/^$/d' > proxy.domain; echo "$step proxy.domain $(stat -c '%s' proxy.domain) bytes"
          step="Proxy Rules: sort proxy.domain"; LC_ALL=C sort -u -o proxy.domain proxy.domain; echo "$step proxy.domain $(stat -c '%s' proxy.domain) bytes"

      - name: Deduplicate and Sort Domain Lists
        run: |
          set -eo pipefail
          for file in *.domain; do echo "Domain Rules: Pre-processing stats $file $(stat -c '%s' "$file") bytes"; done
          for file in *.domain; do sort -u "$file" | awk -F'.' '{subdomain = $(NF-1)"."$NF; if (!(subdomain in seen)) { seen[subdomain] = $0; }} END {for (domain in seen) {print seen[domain];}}' > "$file.tmp"; echo "Domain Rules: Deduplicating $file.tmp $(stat -c '%s' "$file.tmp") bytes"; mv "$file.tmp" "$file"; done
          for file in *.domain; do LC_ALL=C sort -u -o "$file" "$file"; echo "Domain Rules: Final sorting $file $(stat -c '%s' "$file") bytes"; done

      - name: Clean Files
        run: |
          set -eo pipefail
          rm -rf .github; git rm -rf --cached .github || true
          rm -f *.txt *.list *.tmp || true
          for file in *.domain *.rule; do sed -i '/^[[:space:]]*$/d' "$file"; sed -i '${/^$/d}' "$file"; echo -n "$(cat "$file")" > "$file"; echo "Clean $file $(stat -c '%s' "$file") bytes"; done
          for file in *.domain *.rule; do if [ -f "$file" ] && [ ! -s "$file" ]; then rm -f "$file"; fi; done

      - name: Commit & Push
        run: |
          set -eo pipefail
          git config --global user.email "actions@github.com"; git config --global user.name "GitHub Actions"
          if [[ $(git status --porcelain) ]]; then git add --ignore-errors -- '*.domain' '*.rule'; git commit -m "Rules update $(date)"; git push origin rule --force; else echo "No changes detected, nothing to commit."; fi