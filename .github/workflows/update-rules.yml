name: Update Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rule branch
        uses: actions/checkout@v4
        with:
          ref: rule
          fetch-depth: 0

      - name: Purge previous files keep .github
        run: |
          git rm -rf ./* || true
          find . -mindepth 1 -maxdepth 1 -not -name '.git' -not -name '.github' -exec rm -rf {} +

      # 3) proxy.domain 基于 gfw.txt
      - name: Build proxy.domain from gfw.txt
        run: |
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/gfw.txt -o gfw.txt.tmp
          awk '!/^#/ && NF {
            gsub(/^[[:space:]]+|[[:space:]]+$/,"")
            if(substr($0,1,1)!=".") print "."$0
            else print $0
          }' gfw.txt.tmp | sort -u > proxy.domain

      # 3b) proxy.rule (Telegram CIDR)
      - name: Build proxy.rule from Telegram CIDR
        run: |
          curl -sSL https://core.telegram.org/resources/cidr.txt -o telegram.cidr.tmp
          awk '
          /^[[:space:]]*#/ {next}
          /^[[:space:]]*$/ {next}
          {
            cidr=$0
            gsub(/^[[:space:]]+|[[:space:]]+$/,"",cidr)
            if (cidr ~ /:/) print "IP-CIDR6," cidr
            else print "IP-CIDR," cidr
          }' telegram.cidr.tmp > proxy.rule

      # 4) direct.domain
      - name: Build direct.domain with dot prefix
        run: |
          curl -sSL https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/direct.txt -o direct.txt.tmp
          awk '!/^#/ && NF {
            gsub(/^[[:space:]]+|[[:space:]]+$/,"")
            if(substr($0,1,1)!=".") print "."$0
            else print $0
          }' direct.txt.tmp | sort -u > direct.domain

      # 5) blockAds.module → main.module
      - name: Process entire blockAds.module to main.module
        run: |
          curl -sSL https://raw.githubusercontent.com/fmz200/wool_scripts/refs/heads/main/Surge/module/blockAds.module -o blockAds.module.tmp
          awk '
          BEGIN {print "#!name=General"; print "#!category=Main"}
          /^#!arguments/ {next}
          /^[[:space:]]*#/ {next}
          /^[[:space:]]*$/ {next}
          {
            if ($0 ~ /^[A-Z]/) gsub(/[[:space:]]+/,"")
            else gsub(/^[[:space:]]+|[[:space:]]+$/,"")
            print
          }' blockAds.module.tmp > main.module

      # 6) rejectAd.list → reject.domain 和 reject.rule
      - name: Build reject.domain and reject.rule
        run: |
          curl -sSL https://raw.githubusercontent.com/fmz200/wool_scripts/main/Loon/rule/rejectAd.list -o rejectAd.list.tmp
          awk '!/^#/ && NF {
            gsub(/[[:space:]]+/,"")
            if ($0 ~ /^(DOMAIN-SUFFIX|DOMAIN),/) {
              sub(/^(DOMAIN-SUFFIX|DOMAIN),/,"")
              if(substr($0,1,1)!=".") print "."$0 > "reject.domain"
              else print $0 > "reject.domain"
            } else {
              print > "reject.rule"
            }
          }' rejectAd.list.tmp

      # 7) 提交并推送
      - name: Commit and push with detailed changes
        run: |
          rm -f *.tmp
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          NUMSTAT=$(git diff --cached --numstat | awk '{print $3 " +" $1 "/-" $2}')
          git commit -m "Update rules" -m "$NUMSTAT" || echo "No changes to commit"
          git push origin rule
